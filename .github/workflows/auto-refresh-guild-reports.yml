name: Auto Refresh Guild Reports

on:
  schedule:
    # 12:01 PM KST = 03:01 UTC, skip Tuesday (run Sun/Mon/Wed/Thu/Fri/Sat)
    - cron: '1 3 * * 0,1,3,4,5,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 xlsxwriter

      - name: Generate latest reports
        run: |
          python mgf_guild_export.py --guild-name "빅딜" --snapshot-mode latest --retain-history-days 7 --fail-on-invalid-data
          python mgf_guild_export.py --guild-name "셀린느" --snapshot-mode latest --retain-history-days 7 --fail-on-invalid-data
          python mgf_guild_export.py --guild-name "빅딜" --report-mode training --snapshot-mode latest --retain-history-days 7 --fail-on-invalid-data
          python mgf_guild_export.py --guild-name "셀린느" --report-mode training --snapshot-mode latest --retain-history-days 7 --fail-on-invalid-data

      - name: Generate daily history snapshots
        run: |
          SNAPSHOT_DATE=$(TZ='Asia/Seoul' date +%F)
          python mgf_guild_export.py --guild-name "빅딜" --snapshot-mode history --snapshot-date "$SNAPSHOT_DATE" --retain-history-days 7 --fail-on-invalid-data
          python mgf_guild_export.py --guild-name "셀린느" --snapshot-mode history --snapshot-date "$SNAPSHOT_DATE" --retain-history-days 7 --fail-on-invalid-data
          python mgf_guild_export.py --guild-name "빅딜" --report-mode training --snapshot-mode history --snapshot-date "$SNAPSHOT_DATE" --retain-history-days 7 --fail-on-invalid-data
          python mgf_guild_export.py --guild-name "셀린느" --report-mode training --snapshot-mode history --snapshot-date "$SNAPSHOT_DATE" --retain-history-days 7 --fail-on-invalid-data

      - name: Commit and push if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add reports
            git commit -m "build: 빅딜 셀린느 자동 최신 리포트 갱신"
            git push
          else
            echo "No changes to commit"
          fi
